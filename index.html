<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHANTOM XI — Dress Registration</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-wrap">
    <header class="header">
      <div class="logo-wrap">
        <img src="assets/c__Users_Tecdune-54_AppData_Roaming_Cursor_User_workspaceStorage_7252b4aa1b40b677806594beb367944a_images_image-8e53793e-9f75-47ed-a931-50802c506692.png" alt="PHANTOM XI" class="logo" onerror="this.src='assets/logo.png'; this.onerror=function(){ this.style.display='none'; this.nextElementSibling.classList.add('show'); }">
        <div class="logo-fallback">
          <span class="logo-text">PHANTOM XI</span>
          <span class="logo-sub">Cricket Team</span>
        </div>
      </div>
      <h1 class="title">Team Dress Registration</h1>
      <p class="tagline">Team T-shirt, Lower & Cap. Interested players may register below.</p>
    </header>

    <main class="main">
      <form id="kit-form" class="form" novalidate>
        <div class="field">
          <label for="player-name">Player name <span class="req">*</span></label>
          <input type="text" id="player-name" name="playerName" placeholder="Full name" required autocomplete="name">
        </div>

        <div class="field field-mobile">
          <label for="mobile-number">Mobile Number <span class="req">*</span></label>
          <div class="input-wrap-mobile">
            <span class="mobile-prefix" aria-hidden="true">+91</span>
            <input type="tel" id="mobile-number" name="mobileNumber" placeholder="9876543210" inputmode="numeric" maxlength="10" pattern="[6-9][0-9]{9}" required autocomplete="tel">
          </div>
        </div>

        <div class="field">
          <label>Your choice <span class="req">*</span></label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="choice" value="Tshirt Only" required>
              <span class="radio-text">Tshirt Only</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="choice" value="Tshirt + Lower">
              <span class="radio-text">Tshirt + Lower</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="choice" value="Tshirt + Lower + Cap">
              <span class="radio-text">Tshirt + Lower + Cap</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="choice" value="Tshirt + Cap only">
              <span class="radio-text">Tshirt + Cap only</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="tshirt-size">Tshirt Size <span class="req">*</span></label>
          <select id="tshirt-size" name="tshirtSize" required>
            <option value="">Select size</option>
            <option value="S_36">S(36)</option>
            <option value="M_38">M(38)</option>
            <option value="L_40">L(40)</option>
            <option value="XL_42">XL(42)</option>
            <option value="2XL_44">2XL(44)</option>
            <option value="3XL_46">3XL(46)</option>
            <option value="4XL_48">4XL(48)</option>
          </select>
        </div>
        <div class="field" id="field-lower-size" style="display: none;">
          <label for="lower-size">Lower Size <span class="req">*</span></label>
          <select id="lower-size" name="lowerSize">
            <option value="">Select size (Length - Waist)</option>
            <option value="S_38-30">S (38-30)</option>
            <option value="M_39-32">M (39-32)</option>
            <option value="L_40-34">L (40-34)</option>
            <option value="XL_41-36">XL (41-36)</option>
            <option value="2XL_42-38">2XL (42-38)</option>
            <option value="3XL_43-40">3XL(43-40)</option>
          </select>
        </div>

        <div class="field">
          <label for="name-on-tshirt">Name on Tshirt <span class="req">*</span></label>
          <input type="text" id="name-on-tshirt" name="nameOnTshirt" placeholder="As to be printed" required>
        </div>

        <div class="field">
          <label for="number-on-tshirt">Number on Tshirt <span class="req">*</span></label>
          <input type="text" id="number-on-tshirt" name="numberOnTshirt" placeholder="Any number" inputmode="numeric" maxlength="10" pattern="[0-9]+" required>
        </div>

        <div class="field">
          <label>Sleeve Length <span class="req">*</span></label>
          <div class="radio-group inline">
            <label class="radio-label">
              <input type="radio" name="sleeveLength" value="Half" required>
              <span class="radio-text">Half</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="sleeveLength" value="Full">
              <span class="radio-text">Full</span>
            </label>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-submit" id="submit-btn">Submit</button>
          <button type="reset" class="btn btn-reset">Clear</button>
        </div>

        <div id="form-message" class="form-message" aria-live="polite"></div>
      </form>
    </main>

    <footer class="footer">
      <p>PHANTOM XI</p>
    </footer>
  </div>

  <iframe name="phantom-submit-frame" id="phantom-submit-frame" class="submit-frame" title="Form submission"></iframe>

  <div id="success-popup" class="popup-overlay" aria-hidden="true">
    <div class="popup-box">
      <p class="popup-message">Your PHANTOM XI new dress registration has been successfully saved. We will get in touch with you once the T-shirt is printed.</p>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
